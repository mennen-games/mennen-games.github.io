<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Mennen Games</title>
<meta name="theme-color" content="#0A1217" />
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--petrol:#0A1217;--offwhite:#F2F2EB;--mint:#4DD9BF;--muted:#8fa0a4}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--petrol);color:var(--offwhite);
    font-family:'Inter',system-ui,sans-serif;display:grid;place-items:center;text-align:center;padding:24px}
  .code{font-family:'Inconsolata',monospace;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--mint);margin-bottom:18px}
  h1{font-size:clamp(60px,16vw,120px);font-weight:700;letter-spacing:-.04em;margin:0}
  h1 .c{display:inline-block;width:.06em;min-width:4px;height:.7em;background:var(--mint);vertical-align:-.02em;margin-left:.05em;animation:blink 1s steps(1) infinite}
  @keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
  p{color:var(--muted);font-size:16px;margin:16px 0 28px}
  a{display:inline-flex;align-items:center;gap:8px;background:var(--mint);color:var(--petrol);
    font-weight:600;font-size:15px;text-decoration:none;padding:12px 22px;border-radius:11px}
</style>
</head>
<body>
  <div>
    <div class="code">Mennen Games</div>
    <h1>404<span class="c"></span></h1>
    <p>Diese Seite gibt es (noch) nicht. Zurück zum Studio.</p>
    <a href="/">← Zur Startseite</a>
  </div>
</body>
</html>
